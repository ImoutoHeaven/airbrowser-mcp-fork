# Test Environment - Run all tests in Docker
# Usage: ./scripts/run_tests.sh
#   or:  docker compose -f compose.test.yml up --build --abort-on-container-exit

services:
  # Browser pool service (system under test)
  browser-pool:
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      - MAX_BROWSERS=${MAX_BROWSERS:-10}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - COMMAND_TIMEOUT_DEFAULT=90
      - SCREENSHOTS_DIR=${SCREENSHOTS_DIR:-/app/screenshots}
      - SCREENSHOTS_TTL_SECONDS=${SCREENSHOTS_TTL_SECONDS:-3600}
      - SCREENSHOTS_MAX_BYTES=${SCREENSHOTS_MAX_BYTES:-268435456}
      - SCREENSHOTS_MIN_FREE_BYTES=${SCREENSHOTS_MIN_FREE_BYTES:-67108864}
      # Test resolution (overrides default 1920x1080)
      - SCREEN_WIDTH=1366
      - SCREEN_HEIGHT=768
      # Disable session restore for tests (fresh start each time)
      - ENABLE_SESSION_RESTORE=false
      # AI vision (optional - enables vision tests when base URL, key, and model are set)
      - VISION_API_BASE_URL=${VISION_API_BASE_URL:-}
      - VISION_API_KEY=${VISION_API_KEY:-}
      - VISION_MODEL=${VISION_MODEL:-}
      - VISION_STREAM_DEFAULT=${VISION_STREAM_DEFAULT:-}
    tmpfs:
      - /tmp:noexec,nosuid,size=500m
      - /dev/shm:rw,nosuid,nodev,exec,size=4g
    shm_size: 4gb
    init: true
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 10s
    networks:
      - test-network

  # Test runner container
  test-runner:
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - BROWSER_POOL_URL=http://browser-pool:8000
      - PYTHONUNBUFFERED=1
      - PYTEST_ARGS=${PYTEST_ARGS:-}
      - PYTEST_ARGS_B64=${PYTEST_ARGS_B64:-}
      - VISION_API_BASE_URL=${VISION_API_BASE_URL:-}
      - VISION_API_KEY=${VISION_API_KEY:-}
      - VISION_MODEL=${VISION_MODEL:-}
      - VISION_STREAM_DEFAULT=${VISION_STREAM_DEFAULT:-}
      - TEST_PROXY=${TEST_PROXY:-}
    volumes:
      - ./tests:/app/tests:ro
      - ./examples:/app/examples:ro
      - ./docs:/app/docs:ro
      - ./generated-clients:/app/generated-clients:ro
      - ./compose.yml:/app/compose.yml:ro
      - ./compose.local.yml:/app/compose.local.yml:ro
      - ./compose.test.yml:/app/compose.test.yml:ro
      - ./src:/app/src:ro
      - ./pytest.ini:/app/pytest.ini:ro
      - ./docker/test-entrypoint.sh:/test-entrypoint.sh:ro
      - test-results:/app/test-results
    depends_on:
      browser-pool:
        condition: service_healthy
    networks:
      - test-network

networks:
  test-network:
    driver: bridge

volumes:
  test-results:
